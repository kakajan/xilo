host: localhost:8000
info:
  contact:
    email: support@xilo.example.com
    name: Xilo API Support
    url: https://xilo.example.com/support
  description: A self-hosted, Telegram-inspired modern blog platform API.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://xilo.example.com/terms
  title: Xilo Blog Platform API
  version: "1.0"
paths:
  /{type}/{id}/reactions:
    post:
      consumes:
      - application/json
      parameters:
      - description: Target type (post/comment)
        in: path
        name: type
        required: true
        type: string
      - description: Target ID
        in: path
        name: id
        required: true
        type: string
      - description: Reaction data
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Toggle reaction on a target
      tags:
      - reactions
  /ads:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List all ads
      tags:
      - ads
    post:
      consumes:
      - application/json
      parameters:
      - description: Ad data
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create an ad
      tags:
      - ads
  /ads/{id}:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Ad ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated ad data
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update an ad
      tags:
      - ads
