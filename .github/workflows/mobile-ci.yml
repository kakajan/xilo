name: Mobile CI

on:
  push:
    paths:
      - "mobile/**"
  pull_request:
    paths:
      - "mobile/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29"
      - name: Install
        run: flutter pub get
      - name: Analyze
        run: dart analyze
      - name: Test
        run: flutter test --coverage
