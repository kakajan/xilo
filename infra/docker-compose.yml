services:
  api-gateway:
    build:
      context: ../backend
      dockerfile: ../infra/docker/Dockerfile.api-gateway
    ports:
      - "8888:8000"
    env_file:
      - ../backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      meilisearch:
        condition: service_started
      nats:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: xilo
      POSTGRES_PASSWORD: xilo
      POSTGRES_DB: xilo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xilo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]

  meilisearch:
    image: getmeili/meilisearch:v1.9
    ports:
      # Host 7700 is often blocked on Windows Hyper-V; keep container port 7700 for in-network DNS.
      - "17700:7700"
    environment:
      MEILI_MASTER_KEY: xilo-meili-key
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data

  minio:
    image: minio/minio:latest
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3201:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

  loki:
    image: grafana/loki:latest
    ports:
      - "3200:3100"

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:
  prometheus_data:
  grafana_data:
